{% load static %}
<!DOCTYPE html>

<html dir="ltr" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width,initial-scale=1" name="viewport" />
    <meta content="telephone=no" name="format-detection" />
    <!-- favicon -->
    <link href="{% static 'logos/favicon.jpg'%}" rel="icon" />
    {% block meta %}
    {% endblock %}
    {% if title %}
    <title>{{title}} - IBRA</title>
    {% else %}
    <title>Catalogue</title>
    {% endif %}
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,400i,500,500i,700,700i" rel="stylesheet" />
    <!-- css -->
    <script src="{% static 'js/jquery.min.js'%}"></script>
    <link href="{% static 'css/minified.css'%}" rel="stylesheet" />
</head>
<body class="container">
	<div class="mt-5"><input class="form-control password" placeholder="PassWord"></div> 
	<table class="table table-bordered mt-5">
		<tr>
			<td>Source</td>
			<td>Client</td>
			<td>Total</td>
		</tr>
		{% for i in orders %}
		<tr {% if i.isdelivered %} style="background:yellowgreen;"{%endif%}>
				<td>{% if i.isclientcommnd %}{{i.client}}{% else %} {{i.salseman}} {% endif %} {{i.date|date:'d/m/Y'}}</td>
				<td>{{i.client}}</td>
				<td>{{i.total}}</td>
				<td><button class="btn btn-info" onclick="sendtolocal(event, '{{i.id}}')">Envoyer</button></td>
			</tr>
		{% endfor %}
	</table>
	<script>
		function downloadcmd(event, orderid){
			let password=$('.password').val()
			if (password!=''){
				$.get('/dilevered/'+orderid)
				$(event.target).addClass('disabled')
				$(event.target).parent().parent().css('background', 'yellowgreen')
				//url = window.location.pathname.split( '/' );[0]
				var myWindow = window.open('http://'+window.location.href.split( '/' )[2]+'/downloadcmd?id='+orderid, '', 'width=900,height=900');
				myWindow.focus();
				myWindow.addEventListener('load', function() {
					setTimeout(function() {
						try {
							myWindow.print();
							myWindow.close();
						} catch (e) {
							console.error('Failed to print and close the window:', e);
						}
					}, 1000); // 1000 milliseconds = 1 seconds
				}, false);
				 }
		}
		function sendtolocal(event, orderid){
			let password=$('.password').val()
			if (password!=''){
				$.get('/dilevered/'+orderid, {"password":password})
				$(event.target).addClass('disabled')
				$(event.target).parent().parent().css('background', 'yellowgreen')
				//url = window.location.pathname.split( '/' );[0]
			}
		}
			//	$.get('/downloadcmd', {
			//		'orderid':orderid
			//	}, (data)=>{
			//		console.log(data)
			//		if (data.success){
			//			$(event.target).parent().parent().remove()
			//		}else{
			//			$(event.target).removeClass('disabled')
			//		}
			//	}
			//	)
			//	console.log(password)
			//}
		//}
	</script>

</body>

</html>
